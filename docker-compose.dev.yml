version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: rag-backend-dev
    ports:
      - "8000:8000"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_API_URL=${MINIMAX_API_URL}
      - MINIMAX_CHAT_MODEL=${MINIMAX_CHAT_MODEL:-MiniMax-M2.7}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - VECTORSTORE_DIR=/app/vectorstore
      - UPLOAD_DIR=/app/docs
    volumes:
      - ./backend:/app
      - ./docs:/app/docs
      - ./vectorstore:/app/vectorstore
    restart: unless-stopped

  frontend-react:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rag-frontend-dev
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://backend:8000
    restart: unless-stopped

  frontend-vue:
    build:
      context: ./vue-frontend
      dockerfile: Dockerfile.dev
    container_name: rag-vue-frontend-dev
    ports:
      - "3000:5173"
    depends_on:
      - backend
    volumes:
      - ./vue-frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://backend:8000
    restart: unless-stopped
